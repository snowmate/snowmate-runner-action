name: "Regression Testing"
on:
  push:
  workflow_dispatch:
    inputs:
      exampleInput:
        default: xys
        description: "xyz"
        required: true

jobs:
  regression:
    name: regression
    runs-on: ubuntu-20.04
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v3
        with:
          path: regression
      - name: "Test Action"
        working-directory: check
        uses: ./regression
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
